<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Análisis | SIRDE-310</title>
    <!-- Pre-loader SSO: Oculta el login inmediatamente si viene de SASE -->
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('pin') || params.has('token') || sessionStorage.getItem('sirde_session_pin')) {
                const style = document.createElement('style');
                style.id = 'sso-hide-wall';
                style.innerHTML = '#auth-wall { display: none !important; visibility: hidden !important; opacity: 0 !important; }';
                document.head.appendChild(style);
            }
        })();
    </script>
    <link rel="icon" href="logo_secundaria_310.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=2026.2">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        window.tailwind = {
            config: {
                theme: {
                    extend: {
                        colors: {
                            'primary-green': '#816ab8',
                            'secondary-orange': '#afa63c',
                            'tertiary-green': '#b7687a',
                            'primary-glow': 'rgba(129, 106, 184, 0.4)'
                        },
                        fontFamily: {
                            'inter': ['Inter', 'sans-serif'],
                            'manrope': ['Manrope', 'sans-serif'],
                            'space-grotesk': ['Space Grotesk', 'sans-serif']
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="px-3 py-4 sm:px-4 md:p-8 relative">
    <!-- Animated Blobs -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div id="auth-wall" class="fixed inset-0 z-[100] bg-background flex items-center justify-center p-4">
        <div class="card premium-glass w-full max-w-sm text-center space-y-8 animate-fade-up">
            <div class="flex flex-col items-center gap-4">
                <img src="logo_secundaria_310.svg" alt="Logo" class="h-20 w-auto opacity-90 logo-glow-large">
                <h1 class="text-xl font-black italic text-primary-green">ANÁLISIS INSTITUCIONAL</h1>
            </div>
            <label for="entry-pin" class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest">Validación de Credenciales de Tablero</label>
            <div class="space-y-6">
                <div class="pin-container">
                    <input type="password" id="entry-pin" placeholder="Ingresa tu clave de acceso" class="w-full pr-12">
                    <button onclick="togglePinVisibility()" type="button" title="Mostrar/Ocultar contraseña">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <button onclick="checkAccess(document.getElementById('entry-pin').value)" class="btn-primary w-full">ACCEDER AL ANÁLISIS</button>
            </div>
        </div>
    </div>

    <main class="container max-w-6xl mx-auto">
        <!-- HEADER INSTITUCIONAL -->
        <header class="flex flex-col md:flex-row items-start sm:items-center justify-between border-b border-black/5 pb-6 mb-8 gap-6">
            <div class="flex flex-col sm:flex-row items-center gap-4 sm:gap-6 w-full md:w-auto text-center sm:text-left">
                <img src="logo_secundaria_310.svg" alt="Logo" class="h-16 w-auto opacity-90 logo-glow-small">
                <div class="space-y-1">
                    <h1 class="text-2xl font-black text-gradient-animate tracking-tighter m-0 uppercase title-font">ANÁLISIS SIRDE-310</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Respaldando el Desarrollo Institucional</p>
                    <div class="no-print mt-2 flex flex-wrap gap-4 justify-center sm:justify-start">
                        <a href="index.html" class="text-[9px] font-bold text-primary-green hover:underline uppercase tracking-widest">← Regresar</a>
                        <a href="invitacion.html" class="text-[9px] font-bold text-secondary-orange hover:underline uppercase tracking-widest">★ Monitorear Usuarios</a>
                    </div>
                </div>
            </div>
            <div class="flex flex-col items-stretch md:items-end gap-3 no-print w-full md:w-auto">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full md:w-auto">
                    <div class="w-full">
                        <label for="filter-periodo" class="text-[10px] font-bold text-slate-500 uppercase">Periodo</label>
                        <select id="filter-periodo" onchange="runAnalysis()" class="w-full p-2 bg-surface-container border border-black/5 rounded-xl text-xs font-bold focus:outline-none focus:ring-1 focus:ring-primary-green">
                            <option value="T1-2026">T1-2026</option>
                            <option value="T2-2026">T2-2026</option>
                            <option value="T3-2026">T3-2026</option>
                            <option value="T-DIAG">Diagnóstico</option>
                        </select>
                    </div>
                    <div class="w-full">
                        <label for="filter-grupo" class="text-[10px] font-bold text-slate-500 uppercase">Filtrar Grupo</label>
                        <select id="filter-grupo" onchange="runAnalysis()" class="w-full p-2 bg-surface-container border border-black/5 rounded-xl text-xs font-bold focus:outline-none focus:ring-1 focus:ring-primary-green">
                            <option value="Todos">Todos (12)</option>
                            <option value="1º A">1º A</option><option value="1º B">1º B</option><option value="1º C">1º C</option><option value="1º D">1º D</option>
                            <option value="2º A">2º A</option><option value="2º B">2º B</option><option value="2º C">2º C</option><option value="2º D">2º D</option>
                            <option value="3º A">3º A</option><option value="3º B">3º B</option><option value="3º C">3º C</option><option value="3º D">3º D</option>
                        </select>
                    </div>
                    <div class="flex items-end sm:col-span-2">
                        <button onclick="window.print()" class="btn-glow px-4 py-2 font-bold text-[10px] rounded-xl uppercase h-[38px]">
                            Generar Reporte
                        </button>
                    </div>
                </div>
                <button onclick="logoutSIRDE()" class="btn-link self-start md:self-end text-[9px] font-bold text-red-400 hover:text-red-600 uppercase tracking-widest transition-colors mt-2">Cerrar Sesión Segura</button>
            </div>
        </header>

        <!-- PRINT SECTION -->
        <div class="hidden print:block text-center border-b-2 border-black pb-4 mb-8">
            <h1 class="text-xl font-bold uppercase">Informe Institucional de Seguimiento Grupal</h1>
            <p class="text-sm">Escuela Secundaria Técnica 310 • Ciclo Escolar 2025-2026</p>
        </div>

        <div id="stats-summary" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <!-- Stats cards will go here via runAnalysis() / renderAnalysis() -->
        </div>

        <section id="graphs-area" class="space-y-8">
            <!-- Graphs will go here -->
        </section>

        <section id="detailed-lists" class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-12">
            <!-- Lists will go here -->
        </section>

    </main>

    <script src="app.js?v=2026.2"></script>
    <script>
        // Custom Dashboard Logic
        async function runAnalysis() {
            const periodo = document.getElementById('filter-periodo').value;
            const grupo = document.getElementById('filter-grupo').value;
            
            console.log(`Analyzing: ${periodo} / ${grupo}`);
            
            try {
                let query = supabaseClient
                    .from('colectivo_respuestas_docentes')
                    .select('*')
                    .eq('periodo', periodo);
                
                if (grupo !== 'Todos') {
                    query = query.eq('grupo', grupo);
                }
                
                const { data, error } = await query;
                if (error) throw error;
                
                renderAnalysis(data);
            } catch (err) {
                console.error(err);
            }
        }

        function renderAnalysis(data) {
            const stats = document.getElementById('stats-summary');
            const lists = document.getElementById('detailed-lists');
            
            // Basic Summary Generation
            const total = data.length;
            const citadoCount = data.filter(d => d.seguimiento_padres?.citado || d.seguimiento_padres?.citatorio_enviado === 'Sí' || d.citado === 'Sí').length;
            const impactoPct = total > 0 ? (citadoCount / total * 100).toFixed(0) : 0;
            
            stats.innerHTML = `
                <div class="card p-4 sm:p-5 text-center">
                    <span class="text-[10px] font-bold text-slate-500 uppercase">Diagnósticos</span>
                    <p class="text-3xl font-black text-primary-green">${total}</p>
                </div>
                <div class="card p-4 sm:p-5 text-center">
                    <span class="text-[10px] font-bold text-slate-500 uppercase">Padres Citados</span>
                    <p class="text-3xl font-black text-secondary-orange">${citadoCount}</p>
                </div>
                <div class="card p-4 sm:p-5 text-center">
                    <span class="text-[10px] font-bold text-slate-500 uppercase">Impacto Global</span>
                    <p class="text-3xl font-black text-tertiary-green">${impactoPct}%</p>
                </div>
                <div class="card p-4 sm:p-5 text-center bg-primary-green/5 border-primary-green/20">
                    <span class="text-[10px] font-bold text-slate-500 uppercase">Estatus</span>
                    <p class="text-sm font-bold text-primary-green">${total > 5 ? 'CONSISTENTE' : 'PENDIENTE'}</p>
                </div>
            `;

            // Lists rendering
            lists.innerHTML = `
                <div class="card">
                    <h3 class="section-title">Alumnos en Seguimiento</h3>
                    <div class="space-y-2 mt-4">
                        ${data.length ? data.map(d => `
                            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 p-3 impact-factor">
                                <span class="text-xs font-bold min-w-0 break-words">${d.alumno_nombre || d.alumnos_reportados?.[0]?.nombre || 'S/N'}</span>
                                <span class="text-[9px] px-2 py-1 bg-primary-green/5 text-primary-green rounded uppercase shrink-0">${d.grupo}</span>
                            </div>
                        `).join('') : '<div class="impact-factor p-4 text-sm text-slate-500">No hay diagnósticos para el filtro actual.</div>'}
                    </div>
                </div>
                <div class="card">
                    <h3 class="section-title">Problemáticas Detectadas</h3>
                    <div class="space-y-4 mt-4">
                        ${data.length ? data.map(d => {
                            const resumen = (d.comentarios || d.conclusion_general || 'Sin comentario registrado').substring(0, 100);
                            const docente = d.docente || d.docente_nombre || 'Sin docente';
                            return `
                                <div class="conclusion-card text-xs break-words">
                                    <strong class="text-on-surface">${docente}:</strong> ${resumen}${resumen.length === 100 ? '...' : ''}
                                </div>
                            `;
                        }).join('') : '<div class="impact-factor p-4 text-sm text-slate-500">No hay observaciones disponibles para el filtro actual.</div>'}
                    </div>
                </div>
            `;
        }

    </script>
</body>
</html>
