name: Verify

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repo checks
        run: npm run verify

      - name: Start static server
        run: node scripts/static-server.js > server.log 2>&1 &

      - name: Wait for server
        run: |
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:3001/index.html > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat server.log
          exit 1

      - name: Smoke test pages
        run: npm run verify:smoke
