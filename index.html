<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Express - 2° Grado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .btn-toggle {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border-width: 2px;
            border-color: #e2e8f0;
            color: #475569;
            transition-property: all;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .btn-toggle.active {
            border-color: #4f46e5;
            background-color: #eef2ff;
            color: #4338ca;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-4 pb-12">

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
        <header class="mb-8 text-center">
            <h1 class="text-2xl font-bold text-indigo-900">Diagnóstico Express</h1>
            <p class="text-slate-500 text-sm">Completa en menos de 2 minutos</p>
        </header>

        <form id="express-form" class="space-y-8">
            <!-- IDENTIFICACIÓN -->
            <section>
                <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-4">Identificación</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Grupo</label>
                        <select id="grupo" required class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="2° A">2° A</option>
                            <option value="2° B">2° B</option>
                            <option value="2° C">2° C</option>
                            <option value="2° D">2° D</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Asignatura</label>
                        <input type="text" id="asignatura" required placeholder="Ej: Español" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                </div>
            </section>

            <!-- CONDUCTA -->
            <section class="space-y-6">
                <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Conducta</h2>
                
                <div class="space-y-3">
                    <p class="text-sm font-semibold">Interrupciones</p>
                    <div class="flex gap-2" data-type="behavior" data-field="interrupciones">
                        <button type="button" data-val="0" class="btn-toggle flex-1">Nunca</button>
                        <button type="button" data-val="5" class="btn-toggle flex-1">A veces</button>
                        <button type="button" data-val="10" class="btn-toggle flex-1">Frecuente</button>
                    </div>
                </div>

                <div class="space-y-3">
                    <p class="text-sm font-semibold">Desobediencia</p>
                    <div class="flex gap-2" data-type="behavior" data-field="dispositivos">
                        <button type="button" data-val="0" class="btn-toggle flex-1">Nunca</button>
                        <button type="button" data-val="5" class="btn-toggle flex-1">A veces</button>
                        <button type="button" data-val="10" class="btn-toggle flex-1">Frecuente</button>
                    </div>
                </div>

                <div class="space-y-3">
                    <p class="text-sm font-semibold">Agresiones</p>
                    <div class="flex gap-2" data-type="behavior" data-field="movimiento">
                        <button type="button" data-val="0" class="btn-toggle flex-1">Nunca</button>
                        <button type="button" data-val="5" class="btn-toggle flex-1">A veces</button>
                        <button type="button" data-val="10" class="btn-toggle flex-1">Frecuente</button>
                    </div>
                </div>
            </section>

            <!-- IMPACTO -->
            <section class="space-y-3">
                <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Impacto en Aprendizaje</h2>
                <div class="flex gap-2" data-type="single" data-field="impacto">
                    <button type="button" data-val="3" class="btn-toggle flex-1">Bajo</button>
                    <button type="button" data-val="7" class="btn-toggle flex-1">Medio</button>
                    <button type="button" data-val="10" class="btn-toggle flex-1">Alto</button>
                </div>
            </section>

            <!-- TIEMPO PERDIDO -->
            <section class="space-y-3">
                <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Tiempo perdido de clase</h2>
                <div class="flex gap-2" data-type="single" data-field="tiempo_conducta">
                    <button type="button" data-val="<10%" class="btn-toggle flex-1 text-xs"><10%</button>
                    <button type="button" data-val="10-25%" class="btn-toggle flex-1 text-xs">10-25%</button>
                    <button type="button" data-val="25%+" class="btn-toggle flex-1 text-xs">25%+</button>
                </div>
            </section>

            <!-- ESTRATEGIAS -->
            <section class="space-y-3">
                <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Estrategias aplicadas</h2>
                <div class="grid grid-cols-1 gap-2">
                    <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer">
                        <input type="checkbox" name="estrategia" value="Acuerdos" class="w-5 h-5 accent-indigo-600">
                        <span class="text-sm">Acuerdos de convivencia</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer">
                        <input type="checkbox" name="estrategia" value="Padres" class="w-5 h-5 accent-indigo-600">
                        <span class="text-sm">Contacto con padres</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer">
                        <input type="checkbox" name="estrategia" value="Refuerzo" class="w-5 h-5 accent-indigo-600">
                        <span class="text-sm">Refuerzo positivo</span>
                    </label>
                </div>
            </section>

            <!-- COMENTARIO -->
            <section class="space-y-2">
                <label class="block text-sm font-semibold">Comentario breve</label>
                <textarea id="comentarios" rows="2" class="w-full p-4 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none resize-none"></textarea>
            </section>

            <!-- SUBMIT -->
            <button type="submit" id="submit-btn" class="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 transition-all active:scale-95">
                ENVIAR DIAGNÓSTICO
            </button>
        </form>

        <div id="success-msg" class="hidden mt-8 p-6 bg-green-50 border border-green-100 rounded-2xl text-center">
            <div class="text-green-600 text-4xl mb-2">✓</div>
            <p class="font-bold text-green-900">¡Enviado con éxito!</p>
            <button onclick="location.reload()" class="mt-4 text-indigo-600 font-semibold text-sm underline">Hacer otro</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://uvnetpnjinxzhggoqmwz.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_oBpidcqpYzP_JMU-xYi9ZQ_HXYouwyL';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // UI Logic for Toggles
        document.querySelectorAll('.btn-toggle').forEach(btn => {
            btn.onclick = () => {
                btn.parentElement.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
        });

        // Form Logic
        const form = document.getElementById('express-form');
        const submitBtn = document.getElementById('submit-btn');

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            // Get data from toggles
            const getToggleVal = (field) => {
                const active = document.querySelector(`[data-field="${field}"] .active`);
                return active ? active.getAttribute('data-val') : null;
            };

            const payload = {
                grupo: document.getElementById('grupo').value,
                asignatura: document.getElementById('asignatura').value,
                interrupciones: parseInt(getToggleVal('interrupciones') || 0),
                dispositivos: parseInt(getToggleVal('dispositivos') || 0),
                movimiento: parseInt(getToggleVal('movimiento') || 0),
                impacto: parseInt(getToggleVal('impacto') || 3),
                tiempo_conducta: getToggleVal('tiempo_conducta') || '<10%',
                estrategias: Array.from(document.querySelectorAll('input[name="estrategia"]:checked')).map(cb => cb.value),
                comentarios: document.getElementById('comentarios').value,
                fecha: new Date().toISOString()
            };

            // Basic validation
            if (!payload.asignatura) return alert('Ingresa la asignatura');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Enviando...';

            const { error } = await supabaseClient.from('respuestas_docentes').insert([payload]);

            if (error) {
                alert('Error: ' + error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'ENVIAR DIAGNÓSTICO';
            } else {
                form.classList.add('hidden');
                document.getElementById('success-msg').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
